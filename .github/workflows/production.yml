name: Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-electron:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build app
        run: npm run build

      - name: Package Electron app
        run: npm run package:electron

      - name: Verify portable bootstrap and smoke test packaged Electron app on Windows
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/run-windows-packaged-smoke.ps1 npx playwright test --project=electron-smoke

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mixjam-electron-windows-latest
          path: |
            dist-electron/*.exe
            tmp/package-smoke/**
            tmp/verify-electron-window-state/**
            tmp/verify-packaged-ui-size-50-many-lanes/**
            playwright-report/**
            test-results/**
          if-no-files-found: error
          retention-days: 14

  publish-release:
    if: success() && startsWith(github.ref, 'refs/tags/v')
    needs: build-electron
    runs-on: ubuntu-latest
    steps:
      - name: Download verified native artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: mixjam-electron-*
          merge-multiple: true

      - name: Publish verified release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/dist-electron/*.exe
