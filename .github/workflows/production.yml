name: Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-electron:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux window manager
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          fuse_package=libfuse2
          if apt-cache show libfuse2t64 >/dev/null 2>&1; then
            fuse_package=libfuse2t64
          fi
          sudo apt-get install --no-install-recommends --yes openbox x11-utils "$fuse_package"

      - name: Run unit tests
        run: npm test

      - name: Build app
        run: npm run build

      - name: Package Electron app
        run: npm run package:electron

      - name: Smoke test Electron app on Linux
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum --server-args="-screen 0 2560x1440x24" bash scripts/run-electron-with-openbox.sh bash scripts/run-linux-appimage-smoke.sh npx playwright test --project=electron-smoke

      - name: Smoke test Electron app on macOS
        if: runner.os == 'macOS'
        run: bash scripts/run-macos-dmg-smoke.sh npx playwright test --project=electron-smoke

      - name: Verify portable bootstrap and smoke test packaged Electron app on Windows
        if: runner.os == 'Windows'
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/run-windows-packaged-smoke.ps1 npx playwright test --project=electron-smoke

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mixjam-electron-${{ matrix.os }}
          path: |
            dist-electron/*.exe
            dist-electron/*.AppImage
            dist-electron/*.dmg
            tmp/package-smoke/**
            tmp/verify-electron-window-state/**
            tmp/verify-packaged-ui-size-50-many-lanes/**
            playwright-report/**
            test-results/**
          if-no-files-found: error
          retention-days: 14

  publish-release:
    if: success() && startsWith(github.ref, 'refs/tags/v')
    needs: build-electron
    runs-on: ubuntu-latest
    steps:
      - name: Download verified native artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: mixjam-electron-*
          merge-multiple: true

      - name: Publish verified release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/dist-electron/*.exe
            release-artifacts/dist-electron/*.AppImage
            release-artifacts/dist-electron/*.dmg
