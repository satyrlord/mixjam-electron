name: Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-electron:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build app
        run: npm run build

      - name: Package Electron app
        run: npm run package:electron

      - name: Smoke test Electron app on Linux
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum --server-args="-screen 0 2560x1440x24" npx playwright test --project=electron-smoke
        env:
          MIXJAM_SMOKE_PACKAGED: 'true'

      - name: Smoke test Electron app
        if: runner.os != 'Linux'
        run: npx playwright test --project=electron-smoke
        env:
          MIXJAM_SMOKE_PACKAGED: 'true'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mixjam-electron-${{ matrix.os }}
          path: |
            dist-electron/*.exe
            dist-electron/*.AppImage
            dist-electron/*.dmg
          if-no-files-found: error
          retention-days: 14

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-electron/*.exe
            dist-electron/*.AppImage
            dist-electron/*.dmg
